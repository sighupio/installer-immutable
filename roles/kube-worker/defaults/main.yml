---
# --- sysext alignment + worker upgrade (upgrade path, gated by `upgrade`) ---
upgrade: false
# Kubernetes version selects the sysext component set in immutable.yaml (same name used across roles).
kubernetes_version: "1.34.8"
# Shared sysext constants (active symlink dir + store are provisioned by butane at boot).
sysext_release_base: "https://github.com/sighupio/installer-immutable-sysext/releases/download"
sysext_extensions_store: /opt/extensions
sysext_active_dir: /etc/extensions
sysext_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'x86-64' }}"
# immutable.yaml is the source of truth for sysext component versions; overridable for hand-runs.
immutable_manifest_path: "{{ role_path }}/../../immutable.yaml"
# --- OS layer (Flatcar stage + reboot, upgrade path) ---
# os_update_target_version (Flatcar) is resolved from immutable.yaml at runtime.
os_update_server: "https://public.update.sighup-prod.sighup.io/v1/update/"
os_update_group: "stable"
# Reboot is driven by this role inside the drained window; keep update-engine's own strategy off.
os_update_reboot_strategy: "off"
os_update_conf_path: "/etc/flatcar/update.conf"
os_update_reboot_timeout: 600

# We hardcode /etc/kubernetes because kubeadm expects to write files there, maybe we can change that in the future
kubeadm_config_file: /etc/kubernetes/kubeadm.yml
# kubelet-config is the actual name of the object
kubelet_config_path: /var/lib/kubelet/kubelet-config
kubernetes_control_plane_address: "{{ ansible_facts['fqdn'] }}"
kubernetes_bootstrap_token: ""
kubernetes_ca_hash: ""
# cloud-provider flag removed from kube-apiserver in K8s v1.33+
# Still used by kube-controller-manager and kubelet, also in kube-apiserver in supported versions 1.31 and 1.32
kubernetes_cloud_provider: ""
kubernetes_hostname: "{{ ansible_facts['fqdn'] }}"
kubernetes_role: "worker"
kubernetes_taints: []

kubelet_config_cgroup_driver: "systemd"
kubelet_config_streaming_connection_idle_timeout: "5m"
kubelet_config_read_only_port: 0

kubelet_config_server_tls_bootstrap: true

# kubelet_config_tls_cert_file: /var/lib/kubelet/pki/kubelet.crt
# kubelet_config_tls_private_key_file: /var/lib/kubelet/pki/kubelet.key
kubelet_certificate_authority_file: /etc/kubernetes/pki/ca.crt
kubelet_config_pod_pids_limit: 4096
# Setting this to empty we disable static pod manifests in the workers
kubelet_config_static_pod_path: ""

## Encryption
tls_cipher_suites:
  - TLS_AES_128_GCM_SHA256
  - TLS_AES_256_GCM_SHA384
  - TLS_CHACHA20_POLY1305_SHA256
  - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
  - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
  - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
  - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
  - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
  - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
  - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
  - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256

kubelet_tls_cipher_suites:
  - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
  - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
  - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
  - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
  - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
  - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
