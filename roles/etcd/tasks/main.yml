---
# Phase 1: Generate TLS certificates
- name: Include TLS certificate generation
  ansible.builtin.include_tasks: tls.yml

# Phase 2: Configure etcd
- name: Configure /etc/etcd/etcd.env
  ansible.builtin.template:
    src: etcd.env.j2
    dest: "{{ etcd_config_dir }}/etcd.env"
    owner: root
    group: root
    mode: "0644"
  register: etcd_config

- name: Copying etcdctl config envs
  ansible.builtin.template:
    src: etcdctl.sh.j2
    dest: /etc/profile.d/etcdctl.sh
    mode: "0644"

- name: Restart etcd if configuration changed
  ansible.builtin.systemd:
    name: etcd
    daemon_reload: true
    state: restarted
  # On an upgrade run the unconditional restart in certs_renewal.yaml already picks up the new etcd.env
  # (templated above before that restart), so this earlier restart is a redundant quorum-affecting outage.
  when: etcd_config.changed and not (etcd_upgrade | default(false) | bool)

- name: Enable and start etcd
  ansible.builtin.systemd:
    name: etcd
    daemon_reload: true
    enabled: true
    state: started

# Stage the etcd extension during an upgrade; the new binary activates at the control-plane reboot, not by an in-band restart.
- name: Align the etcd system extension during upgrade
  ansible.builtin.include_role:
    name: sysext
    tasks_from: align.yml
  vars:
    sysext_components:
      - etcd
  when: etcd_upgrade | bool

# Certificate renewal (conditional - only during upgrades)
- name: Include certificate renewal
  ansible.builtin.include_tasks: certs_renewal.yaml
  when: etcd_upgrade | bool

# Certificate distribution (conditional - when etcd is separate)
- name: Include certificate distribution
  ansible.builtin.include_tasks: certs_distribution.yaml
  when: not (etcd_on_control_plane | bool) and etcd_cert_result.changed
