---
# Prefer super-admin.conf (system:masters, immune to the kubeadm:cluster-admins binding), else admin.conf; fetched from a reachable control-plane so dedicated etcd works too.
- name: Fetch super-admin.conf from a reachable control-plane node
  run_once: true
  ansible.builtin.fetch:
    src: /etc/kubernetes/super-admin.conf
    dest: ./admin.conf
    flat: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['control_plane'] | default([]) }}"
  ignore_unreachable: true
  failed_when: false

- name: Check whether super-admin.conf reached the controller
  run_once: true
  become: false # localhost read, no root
  delegate_to: localhost
  ansible.builtin.stat:
    path: ./admin.conf
  register: node_upgrade_super_admin_conf

- name: Fall back to admin.conf when super-admin.conf is absent (pre-1.29 clusters)
  run_once: true
  when: not node_upgrade_super_admin_conf.stat.exists
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: ./admin.conf
    flat: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['control_plane'] | default([]) }}"
  ignore_unreachable: true
  failed_when: false

- name: Check the controller kubeconfig reached the controller
  run_once: true
  become: false # localhost read, no root
  delegate_to: localhost
  ansible.builtin.stat:
    path: ./admin.conf
  register: node_upgrade_admin_conf

- name: Assert a controller kubeconfig was obtained from a control-plane
  run_once: true
  ansible.builtin.assert:
    that:
      - (groups['control_plane'] | default([]) | length) > 0
      - node_upgrade_admin_conf.stat.exists
    fail_msg: >-
      Could not obtain a controller kubeconfig (super-admin.conf/admin.conf) from any control-plane host
      ({{ groups['control_plane'] | default([]) | join(', ') }}); the upgrade's controller-side kubectl checks need it.
    success_msg: controller kubeconfig acquired from a control-plane for the upgrade run
