# dnsmasq configuration for the SIGHUP Distribution Immutable kind — "deploy a new DHCP + PXE" case.
#
# Consumed by the quay.io/poseidon/dnsmasq container (which is dnsmasq); the image bundles the
# iPXE binaries referenced below (undionly.kpxe / ipxe.efi), so there is nothing to build by hand.
# Validated with `dnsmasq --test` (syntax check OK).
#
# See docs/install-case-deploy-dhcp.md for how to mount and run this file.

# Address pool handed to nodes — adjust to your subnet.
dhcp-range=192.0.2.50,192.0.2.150,12h

# Serve the iPXE bootloader over TFTP.
enable-tftp
tftp-root=/var/lib/tftpboot

# Second boot: a client already running iPXE is chainloaded to furyctl's built-in boot server.
# Replace only <furyctl-host>; ${mac:hexhyp} is expanded by iPXE to each node's MAC (default port 8080).
dhcp-userclass=set:ipxe,iPXE
dhcp-boot=tag:ipxe,http://<furyctl-host>:8080/boot/${mac:hexhyp}

# First boot: a plain (UEFI) PXE client gets the iPXE bootloader (bundled in the image).
# Assumes a UEFI fleet (modern bare metal + every hypervisor). This single default is all
# you need. Only for a MIXED BIOS+UEFI fleet, replace the line above's fallback by matching
# arch (option 93) instead — BIOS firmware cannot run ipxe.efi and vice versa:
#   dhcp-match=set:bios,option:client-arch,0
#   dhcp-boot=tag:bios,undionly.kpxe
#   dhcp-match=set:efi,option:client-arch,7
#   dhcp-boot=tag:efi,ipxe.efi
dhcp-boot=ipxe.efi
