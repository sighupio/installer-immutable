---
# etcd node name (default: FQDN from inventory_hostname)
etcd_name: "{{ inventory_hostname }}"

# Directories (fixed by sysext)
etcd_config_dir: /etc/etcd
etcd_certs_dir: /etc/etcd/pki
etcd_data_dir: /var/lib/etcd

# Network
etcd_address: "{{ ansible_facts['default_ipv4'].address }}"

# Client URLs - Listen on both localhost and node IP, but only advertise node IP
etcd_listen_client_urls: "https://{{ ansible_facts['default_ipv4'].address }}:2379,https://127.0.0.1:2379"
etcd_advertise_client_urls: "https://{{ ansible_facts['default_ipv4'].address }}:2379"

# Metrics
etcd_metrics_address: "{{ ansible_facts['default_ipv4'].address }}"
etcd_metrics_port: 2378

# Cluster (MUST be defined in inventory/group_vars or playbook)
etcd_initial_cluster: ""
etcd_initial_cluster_state: "new"
# This is the Ansible group name that contains the etcd nodes, by default we consider
# that etcd is deployed on control plane nodes
etcd_ansible_group_name: "control_plane"

# Local PKI path (where furyctl generated the CA)
etcd_pki_local_dir: "{{ playbook_dir }}/../pki/etcd"

# Certificate distribution (when etcd is separate from control plane)
# remember to set etcd_ansible_group_name accordingly when etcd is separate
etcd_on_control_plane: true
etcd_certs:
  - etcd/ca.crt
  - apiserver-etcd-client.crt
  - apiserver-etcd-client.key

# Certificate renewal (for upgrades)
etcd_upgrade: false

# --- sysext alignment (upgrade path, gated by etcd_upgrade) ---
etcd_sysext_changed: false
# Kubernetes version selects the sysext component set in immutable.yaml (same name used across roles).
kubernetes_version: "1.34.8"
# Shared sysext constants (active symlink dir + store are provisioned by butane at boot).
sysext_release_base: "https://github.com/sighupio/installer-immutable-sysext/releases/download"
sysext_extensions_store: /opt/extensions
sysext_active_dir: /etc/extensions
sysext_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'x86-64' }}"
# immutable.yaml is the source of truth for sysext component versions; overridable for hand-runs.
immutable_manifest_path: "{{ role_path }}/../../immutable.yaml"
# These are the endpoints used to connect to etcd using etcdctl. Its value should be a list of the endpoints.
# Example: ["https://<node_ip>:2379", "https://<node_ip2>:2379"]
etcd_endpoints: []
