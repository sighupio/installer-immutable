---
# After the dedicated etcd node reboots, wait until it rejoined and the whole cluster is healthy before moving on (serial:1 → next member won't reboot until this one is back).
- name: Wait for etcd to report the whole cluster healthy after the reboot
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      source /etc/profile.d/etcdctl.sh;
      etcdctl endpoint health --cluster
    executable: /bin/bash
  register: etcd_postreboot_health
  changed_when: false
  until: etcd_postreboot_health.rc == 0
  retries: 30
  delay: 5

# Upgrade confirmed OK, so the pre-reboot snapshot is no longer needed; move it to tmpfs to self-clear and not pile up on the node.
# find (not a glob) so an already-empty backup dir (e.g. an isolated re-run) is a no-op instead of a literal-glob mv failure.
- name: Move the confirmed-safe etcd snapshot to /tmp so it does not accumulate
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      find {{ ansible_facts['env']['HOME'] }}/etcd-backup -maxdepth 1 -name '*.db' -print -exec mv {} /tmp/ ';'
    executable: /bin/bash
  register: etcd_snapshot_move
  changed_when: etcd_snapshot_move.stdout | length > 0
