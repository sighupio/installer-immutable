# dnsmasq configuration for the SIGHUP Distribution Immutable kind — "deploy a new DHCP + PXE" case.
#
# UEFI HTTP Boot path (no TFTP). Consumed by the quay.io/poseidon/dnsmasq container (which is dnsmasq).
# dnsmasq does DHCP + DNS only — it has NO built-in HTTP server, so the ipxe.efi referenced below must be
# hosted by a separate web server you run (nginx, Caddy, or `python3 -m http.server`). The dnsmasq image
# bundles ipxe.efi under its (now-unused) TFTP root — copy that file out, or download it from
# https://boot.ipxe.org/ipxe.efi — and serve it from your HTTP host.
#
# UEFI-ONLY: UEFI HTTP Boot requires UEFI 2.5+ firmware. Legacy BIOS cannot HTTP boot (its PXE ROM has no
# HTTP client), so a BIOS fleet is NOT supported by this config.
#
# Validated with `dnsmasq --test` (syntax check OK).
# See docs/install-case-deploy-dhcp.md for how to mount and run this file.

# Address pool handed to nodes — adjust to your subnet.
dhcp-range=192.0.2.50,192.0.2.150,12h

# First boot: UEFI HTTP-Boot firmware fetches ipxe.efi over HTTP.
# Firmware sends vendor-class (option 60) "HTTPClient" (it may append arch, e.g. "HTTPClient:Arch:00016:...");
# substring-match it to tag the client.
dhcp-vendorclass=set:httpboot,HTTPClient

# Echo option 60 = "HTTPClient" back on the offer. REQUIRED and force-sent: the firmware ignores any offer
# that does not carry vendor-class "HTTPClient".
dhcp-option-force=tag:httpboot,60,HTTPClient

# Hand HTTP-Boot firmware the FULL http:// URL of ipxe.efi (option 67).
# Replace <http-host> with your HTTP server that serves ipxe.efi (see header).
dhcp-boot=tag:httpboot,http://<http-host>/ipxe.efi

# Second boot: iPXE is now running; chainload it to furyctl's boot server.
# After ipxe.efi loads, iPXE re-requests DHCP carrying user-class (option 77) "iPXE".
# Replace only <furyctl-host>; ${mac:hexhyp} is expanded by iPXE to each node's MAC (default port 8080).
dhcp-userclass=set:ipxe,iPXE
dhcp-boot=tag:ipxe,http://<furyctl-host>:8080/boot/${mac:hexhyp}

# NOTE: no enable-tftp / tftp-root — nothing is served over TFTP on the HTTP-boot path.
