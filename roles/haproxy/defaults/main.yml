---
haproxy_configuration_file_path: "/etc/haproxy/haproxy.cfg"
# haproxy_container_image / haproxy_container_tag are rendered by furyctl from
# immutable.yaml into group_vars/all.yml — no in-role default (single source).
haproxy_configuration: |
  # example haproxy.cfg
  global
    maxconn 512
  frontend stats
    bind *:1936
    mode http
    log global
    maxconn 10
    timeout client 100s
    stats enable
    stats uri /stats
    stats hide-version
    stats refresh 30s
    stats show-node
